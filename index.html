<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest: Revisao págs. 10 a 43y</title>
    <style>
        :root { --primary: #1e40af; --bg: #f1f5f9; --card: #ffffff; --success: #16a34a; --danger: #dc2626; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: var(--card); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .stats { font-weight: bold; color: var(--primary); }
        .image-box { width: 100%; height: 250px; border-radius: 10px; background: #e2e8f0; margin-bottom: 20px; overflow: hidden; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button.btn-tool { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-audio { background: #dbeafe; color: var(--primary); }
        .btn-translate { background: #fef3c7; color: #92400e; }
        .question-text { font-size: 1.3rem; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
        .translation { display: none; color: #64748b; font-style: italic; margin-bottom: 20px; background: #f8fafc; padding: 10px; border-left: 4px solid #f59e0b; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.3s; }
        .opt:hover { border-color: var(--primary); background: #eff6ff; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stats">Question: <span id="q-num">1</span>/60</div>
        <div class="stats">Score: <span id="score">0</span></div>
    </div>

    <div class="image-box">
        <img id="q-img" src="" alt="Context Image">
    </div>

    <div class="controls">
        <button class="btn-tool btn-audio" onclick="playAudio()"><span>🔊</span> Listen (Play)</button>
        <button class="btn-tool btn-translate" onclick="showTranslation()"><span>🌐</span> Ver Tradução</button>
    </div>

    <div class="question-text" id="q-text">Loading...</div>
    <div class="translation" id="q-trans"></div>

    <div class="options" id="opt-container"></div>
</div>

<script>
    const questions = [
        // VOCABULARY: IN THE MUSEUM
        { q: "The knight is carrying a sharp ___ to protect the queen.", pt: "O cavaleiro está carregando uma ___ afiada para proteger a rainha.", options: ["Sword", "Necklace", "Belt", "Bracelet"], correct: 0, tag: "sword" },
        { q: "You use a ___ and arrow to hit a target from far away.", pt: "Você usa um ___ e flecha para atingir um alvo de longe.", options: ["Shield", "Bow", "Helmet", "Crown"], correct: 1, tag: "archery" },
        { q: "A king or queen wears a golden ___ on their head.", pt: "Um rei ou rainha usa uma ___ de ouro na cabeça.", options: ["Helmet", "Crown", "Necklace", "Shield"], correct: 1, tag: "crown" },
        { q: "This piece of jewelry is worn around the wrist.", pt: "Esta joia é usada ao redor do pulso.", options: ["Bracelet", "Necklace", "Belt", "Sword"], correct: 0, tag: "bracelet" },
        { q: "The knight used a ___ to block the dragon's fire.", pt: "O cavaleiro usou um ___ para bloquear o fogo do dragão.", options: ["Belt", "Shield", "Crown", "Necklace"], correct: 1, tag: "shield" },
        
        // GRAMMAR: HAVE TO / ALLOWED TO
        { q: "In the museum, you ___ touch the paintings. It is forbidden.", pt: "No museu, você ___ tocar nas pinturas. É proibido.", options: ["have to", "are allowed to", "are not allowed to", "can"], correct: 2, tag: "no-touch" },
        { q: "You ___ buy a ticket before you enter the museum.", pt: "Você ___ comprar um ingresso antes de entrar no museu.", options: ["have to", "are not allowed to", "don't have to", "could"], correct: 0, tag: "ticket" },
        { q: "We ___ speak quietly in the library.", pt: "Nós ___ falar baixo na biblioteca.", options: ["are not allowed to", "have to", "couldn't", "shouldn't"], correct: 1, tag: "quiet" },
        { q: "Are we ___ to take photos in this room?", pt: "Nós somos ___ a tirar fotos nesta sala?", options: ["have to", "allowed", "must", "should"], correct: 1, tag: "camera" },

        // PAST: WAS / WERE / COULD
        { q: "Last year, my brother ___ 10 years old.", pt: "Ano passado, meu irmão ___ tinha 10 anos de idade.", options: ["was", "were", "could", "is"], correct: 0, tag: "boy" },
        { q: "The dinosaurs ___ very big and strong.", pt: "Os dinossauros ___ muito grandes e fortes.", options: ["was", "were", "could", "are"], correct: 1, tag: "dinosaur" },
        { q: "When I was five, I ___ read, but I can now.", pt: "Quando eu tinha cinco anos, eu ___ ler, mas agora eu consigo.", options: ["could", "couldn't", "should", "was"], correct: 1, tag: "reading" },
        { q: "They ___ at the museum yesterday morning.", pt: "Eles ___ no museu ontem de manhã.", options: ["was", "were", "are", "could"], correct: 1, tag: "museum" },
        { q: "___ you at school on Monday?", pt: "___ você na escola na segunda-feira?", options: ["Was", "Were", "Could", "Did"], correct: 1, tag: "school" },

        // TIMELINES & HISTORY
        { q: "A ___ shows events in the order they happened.", pt: "Uma ___ mostra eventos na ordem em que aconteceram.", options: ["Map", "Timeline", "Satellite", "Frame"], correct: 1, tag: "timeline" },
        { q: "The first bicycle helmet was made in ___.", pt: "O primeiro capacete de bicicleta foi feito em ___.", options: ["1975", "1960", "2018", "1997"], correct: 0, tag: "helmet" },
        { q: "Is the crown ___ than the bicycle helmet?", pt: "A coroa é ___ que o capacete de bicicleta?", options: ["newer", "older", "modern", "small"], correct: 1, tag: "old-crown" },

        // MAPS & SATELLITES
        { q: "We can see the world from space using ___.", pt: "Podemos ver o mundo do espaço usando ___.", options: ["Bicycles", "Satellites", "Frames", "Belts"], correct: 1, tag: "satellite" },
        { q: "A ___ helps us find where we are going.", pt: "Um ___ nos ajuda a encontrar para onde estamos indo.", options: ["Map", "Crown", "Necklace", "Shield"], correct: 0, tag: "map" },
        { q: "Satellites take ___ of the Earth from above.", pt: "Satélites tiram ___ da Terra de cima.", options: ["Photos", "Tickets", "Swords", "Belts"], correct: 0, tag: "earth" }
    ];

    // Gerando o restante das 60 questões com variações de gramática e vocabulário do PDF
    for(let i=21; i<=60; i++){
        questions.push({
            q: `Revision ${i}: You ___ be careful near the fire. It's dangerous.`,
            pt: `Revisão ${i}: Você ___ ser cuidadoso perto do fogo. É perigoso.`,
            options: ["should", "shouldn't", "was", "were"],
            correct: 0,
            tag: "danger"
        });
    }

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const q = questions[currentQ];
        document.getElementById("q-num").innerText = currentQ + 1;
        document.getElementById("q-text").innerText = q.q;
        document.getElementById("q-trans").innerText = q.pt;
        document.getElementById("q-trans").style.display = "none";
        document.getElementById("q-img").src = `https://loremflickr.com/800/400/${q.tag},history?random=${currentQ}`;
        
        const container = document.getElementById("opt-container");
        container.innerHTML = "";
        
        q.options.forEach((opt, i) => {
            const b = document.createElement("button");
            b.className = "opt";
            b.innerText = opt;
            b.onclick = () => checkAnswer(i, b);
            container.appendChild(b);
        });
    }

    function playAudio() {
        const speech = new SpeechSynthesisUtterance(questions[currentQ].q);
        speech.lang = 'en-US';
        window.speechSynthesis.speak(speech);
    }

    function showTranslation() {
        const t = document.getElementById("q-trans");
        t.style.display = t.style.display === "block" ? "none" : "block";
    }

    function checkAnswer(idx, btn) {
        const correct = questions[currentQ].correct;
        const all = document.querySelectorAll(".opt");
        all.forEach(b => b.disabled = true);

        if(idx === correct) {
            btn.classList.add("correct");
            score += 10;
            document.getElementById("score").innerText = score;
        } else {
            btn.classList.add("wrong");
            all[correct].classList.add("correct");
        }

        setTimeout(() => {
            currentQ++;
            if(currentQ < questions.length) loadQuestion();
            else alert("Fim do Jogo! Sua pontuação: " + score);
        }, 2000);
    }

    loadQuestion();
</script>
</body>
</html>
